<svg viewBox="0 0 260 230" xmlns="http://www.w3.org/2000/svg" fill="none">

  <!-- CLIPBOARD -->
  <!-- Clip/clamp at top -->
  <rect x="98" y="10" width="64" height="28" rx="8"
        fill="#C4956A" fill-opacity="0.25" stroke="#C4956A" stroke-width="2.5"/>
  <!-- Clip hole -->
  <circle cx="130" cy="24" r="9" fill="#C4956A" fill-opacity="0.12" stroke="#C4956A" stroke-width="2"/>

  <!-- Clipboard body -->
  <rect x="38" y="24" width="184" height="195" rx="10"
        fill="#C4956A" fill-opacity="0.1" stroke="#C4956A" stroke-width="2.5"/>

  <!-- Header bar inside clipboard -->
  <rect x="52" y="46" width="156" height="24" rx="5"
        fill="#C4956A" fill-opacity="0.2" stroke="none"/>
  <line x1="66" y1="58" x2="178" y2="58" stroke="#C4956A" stroke-width="2" stroke-linecap="round" opacity="0.55"/>

  <!-- Check item 1 -->
  <!-- Checkmark -->
  <path d="M 60,96 L 68,106 L 84,84" stroke="#7A9E7E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <!-- Text line -->
  <line x1="96" y1="95" x2="186" y2="95" stroke="#D4E4D6" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

  <!-- Check item 2 -->
  <path d="M 60,128 L 68,138 L 84,116" stroke="#7A9E7E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <line x1="96" y1="127" x2="196" y2="127" stroke="#D4E4D6" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

  <!-- Check item 3 -->
  <path d="M 60,160 L 68,170 L 84,148" stroke="#7A9E7E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <line x1="96" y1="159" x2="172" y2="159" stroke="#D4E4D6" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

  <!-- Check item 4 -->
  <path d="M 60,192 L 68,202 L 84,180" stroke="#7A9E7E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <line x1="96" y1="191" x2="182" y2="191" stroke="#D4E4D6" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

  <!-- CERTIFICATION BADGE (overlapping bottom-right of clipboard) -->
  <!-- Outer seal circle -->
  <circle cx="192" cy="186" r="38"
          fill="#1E3D2A" stroke="#C4956A" stroke-width="2.5"/>
  <!-- Inner circle ring -->
  <circle cx="192" cy="186" r="28" stroke="#C4956A" stroke-width="1.5" opacity="0.6"/>
  <!-- Star inside badge -->
  <path d="M 192,165 L 196.5,179 L 211,179 L 199.5,187.5 L 204,202 L 192,193.5 L 180,202 L 184.5,187.5 L 173,179 L 187.5,179 Z"
        fill="#C4956A" opacity="0.75" stroke="none"/>
  <!-- Ribbon tails below badge -->
  <path d="M 174,220 L 184,206 L 192,212 L 200,206 L 210,220 L 204,216 L 192,222 L 180,216 Z"
        fill="#7A9E7E" fill-opacity="0.5" stroke="#7A9E7E" stroke-width="1.5" stroke-linejoin="round" opacity="0.65"/>
</svg>
