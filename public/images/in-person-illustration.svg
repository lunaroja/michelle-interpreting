<svg viewBox="0 0 270 230" xmlns="http://www.w3.org/2000/svg" fill="none">

  <!-- Flat parapet / cornice band at top (institutional, not a house) -->
  <rect x="18" y="24" width="234" height="20" rx="3"
        fill="#C4956A" fill-opacity="0.3" stroke="#C4956A" stroke-width="2"/>
  <!-- Small vertical accent above parapet (rooftop unit / HVAC box) -->
  <rect x="110" y="12" width="50" height="16" rx="2"
        fill="#7A9E7E" fill-opacity="0.25" stroke="#7A9E7E" stroke-width="1.5"/>

  <!-- Building body (tall, flat-top, institutional) -->
  <rect x="24" y="42" width="222" height="170" rx="3"
        fill="#C4956A" fill-opacity="0.08" stroke="#C4956A" stroke-width="2.5"/>

  <!-- TOP FLOOR: 4 windows with cross-dividers -->
  <rect x="38" y="58" width="36" height="28" rx="3"
        fill="#D4E4D6" fill-opacity="0.22" stroke="#D4E4D6" stroke-width="2" opacity="0.8"/>
  <line x1="56" y1="58" x2="56" y2="86" stroke="#D4E4D6" stroke-width="1.2" opacity="0.5"/>
  <line x1="38" y1="72" x2="74" y2="72" stroke="#D4E4D6" stroke-width="1.2" opacity="0.5"/>

  <rect x="86" y="58" width="36" height="28" rx="3"
        fill="#D4E4D6" fill-opacity="0.22" stroke="#D4E4D6" stroke-width="2" opacity="0.8"/>
  <line x1="104" y1="58" x2="104" y2="86" stroke="#D4E4D6" stroke-width="1.2" opacity="0.5"/>
  <line x1="86" y1="72" x2="122" y2="72" stroke="#D4E4D6" stroke-width="1.2" opacity="0.5"/>

  <rect x="148" y="58" width="36" height="28" rx="3"
        fill="#D4E4D6" fill-opacity="0.22" stroke="#D4E4D6" stroke-width="2" opacity="0.8"/>
  <line x1="166" y1="58" x2="166" y2="86" stroke="#D4E4D6" stroke-width="1.2" opacity="0.5"/>
  <line x1="148" y1="72" x2="184" y2="72" stroke="#D4E4D6" stroke-width="1.2" opacity="0.5"/>

  <rect x="196" y="58" width="36" height="28" rx="3"
        fill="#D4E4D6" fill-opacity="0.22" stroke="#D4E4D6" stroke-width="2" opacity="0.8"/>
  <line x1="214" y1="58" x2="214" y2="86" stroke="#D4E4D6" stroke-width="1.2" opacity="0.5"/>
  <line x1="196" y1="72" x2="232" y2="72" stroke="#D4E4D6" stroke-width="1.2" opacity="0.5"/>

  <!-- MEDICAL CROSS (centered on facade between the two window rows) -->
  <rect x="120" y="95" width="30" height="11" rx="2"
        fill="#C4956A" fill-opacity="0.6" stroke="#C4956A" stroke-width="1.5"/>
  <rect x="130" y="85" width="11" height="31" rx="2"
        fill="#C4956A" fill-opacity="0.6" stroke="#C4956A" stroke-width="1.5"/>

  <!-- SECOND FLOOR: 4 windows flanking the cross area -->
  <rect x="38" y="120" width="36" height="28" rx="3"
        fill="#D4E4D6" fill-opacity="0.22" stroke="#D4E4D6" stroke-width="2" opacity="0.8"/>
  <line x1="56" y1="120" x2="56" y2="148" stroke="#D4E4D6" stroke-width="1.2" opacity="0.5"/>
  <line x1="38" y1="134" x2="74" y2="134" stroke="#D4E4D6" stroke-width="1.2" opacity="0.5"/>

  <rect x="86" y="120" width="36" height="28" rx="3"
        fill="#D4E4D6" fill-opacity="0.22" stroke="#D4E4D6" stroke-width="2" opacity="0.8"/>
  <line x1="104" y1="120" x2="104" y2="148" stroke="#D4E4D6" stroke-width="1.2" opacity="0.5"/>
  <line x1="86" y1="134" x2="122" y2="134" stroke="#D4E4D6" stroke-width="1.2" opacity="0.5"/>

  <rect x="148" y="120" width="36" height="28" rx="3"
        fill="#D4E4D6" fill-opacity="0.22" stroke="#D4E4D6" stroke-width="2" opacity="0.8"/>
  <line x1="166" y1="120" x2="166" y2="148" stroke="#D4E4D6" stroke-width="1.2" opacity="0.5"/>
  <line x1="148" y1="134" x2="184" y2="134" stroke="#D4E4D6" stroke-width="1.2" opacity="0.5"/>

  <rect x="196" y="120" width="36" height="28" rx="3"
        fill="#D4E4D6" fill-opacity="0.22" stroke="#D4E4D6" stroke-width="2" opacity="0.8"/>
  <line x1="214" y1="120" x2="214" y2="148" stroke="#D4E4D6" stroke-width="1.2" opacity="0.5"/>
  <line x1="196" y1="134" x2="232" y2="134" stroke="#D4E4D6" stroke-width="1.2" opacity="0.5"/>

  <!-- ENTRANCE CANOPY (overhang above doors) -->
  <path d="M 94,154 L 96,144 L 174,144 L 176,154 Z"
        fill="#7A9E7E" fill-opacity="0.25" stroke="#7A9E7E" stroke-width="1.8"/>

  <!-- DOUBLE DOORS (automatic sliding style) -->
  <rect x="106" y="154" width="24" height="58" rx="3"
        fill="#7A9E7E" fill-opacity="0.18" stroke="#7A9E7E" stroke-width="2"/>
  <rect x="133" y="154" width="24" height="58" rx="3"
        fill="#7A9E7E" fill-opacity="0.18" stroke="#7A9E7E" stroke-width="2"/>
  <!-- Door handles -->
  <line x1="126" y1="184" x2="130" y2="184" stroke="#C4956A" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="140" y1="184" x2="144" y2="184" stroke="#C4956A" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- STEPS -->
  <line x1="90" y1="212" x2="180" y2="212" stroke="#C4956A" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="82" y1="220" x2="188" y2="220" stroke="#C4956A" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
</svg>
