<svg viewBox="0 0 270 230" xmlns="http://www.w3.org/2000/svg" fill="none">

  <!-- Roof (triangle) -->
  <path d="M 25,68 L 135,12 L 245,68 Z"
        fill="#7A9E7E" fill-opacity="0.2" stroke="#7A9E7E" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Roof ridge cap -->
  <rect x="122" y="10" width="26" height="12" rx="4" fill="#C4956A" opacity="0.4"/>

  <!-- Building body -->
  <rect x="35" y="66" width="200" height="145" rx="4"
        fill="#C4956A" fill-opacity="0.1" stroke="#C4956A" stroke-width="2.5"/>

  <!-- Upper windows (left and right) -->
  <rect x="55" y="88" width="48" height="44" rx="4"
        fill="#D4E4D6" fill-opacity="0.2" stroke="#D4E4D6" stroke-width="2" opacity="0.75"/>
  <!-- Window cross bars -->
  <line x1="79" y1="88" x2="79" y2="132" stroke="#D4E4D6" stroke-width="1.5" opacity="0.6"/>
  <line x1="55" y1="110" x2="103" y2="110" stroke="#D4E4D6" stroke-width="1.5" opacity="0.6"/>

  <rect x="167" y="88" width="48" height="44" rx="4"
        fill="#D4E4D6" fill-opacity="0.2" stroke="#D4E4D6" stroke-width="2" opacity="0.75"/>
  <line x1="191" y1="88" x2="191" y2="132" stroke="#D4E4D6" stroke-width="1.5" opacity="0.6"/>
  <line x1="167" y1="110" x2="215" y2="110" stroke="#D4E4D6" stroke-width="1.5" opacity="0.6"/>

  <!-- Medical cross (centered on upper facade) -->
  <!-- Horizontal bar -->
  <rect x="116" y="88" width="38" height="14" rx="3"
        fill="#C4956A" fill-opacity="0.5" stroke="#C4956A" stroke-width="1.5"/>
  <!-- Vertical bar -->
  <rect x="128" y="76" width="14" height="38" rx="3"
        fill="#C4956A" fill-opacity="0.5" stroke="#C4956A" stroke-width="1.5"/>

  <!-- Door (central) -->
  <rect x="110" y="152" width="50" height="59" rx="4"
        fill="#7A9E7E" fill-opacity="0.18" stroke="#7A9E7E" stroke-width="2.2"/>
  <!-- Door knob -->
  <circle cx="120" cy="183" r="4" fill="#C4956A" opacity="0.7"/>

  <!-- Steps in front of door -->
  <line x1="103" y1="211" x2="167" y2="211" stroke="#C4956A" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="97" y1="218" x2="173" y2="218" stroke="#C4956A" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Ground bushes -->
  <circle cx="25" cy="200" r="16" fill="#7A9E7E" fill-opacity="0.2" stroke="#7A9E7E" stroke-width="2" opacity="0.65"/>
  <circle cx="14" cy="208" r="11" fill="#7A9E7E" fill-opacity="0.15" stroke="#7A9E7E" stroke-width="1.5" opacity="0.55"/>
  <circle cx="245" cy="200" r="16" fill="#7A9E7E" fill-opacity="0.2" stroke="#7A9E7E" stroke-width="2" opacity="0.65"/>
  <circle cx="256" cy="208" r="11" fill="#7A9E7E" fill-opacity="0.15" stroke="#7A9E7E" stroke-width="1.5" opacity="0.55"/>
</svg>
