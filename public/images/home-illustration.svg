<svg viewBox="0 0 280 282" xmlns="http://www.w3.org/2000/svg" fill="none">

  <!-- SPEECH BUBBLES (main visual, top portion) -->

  <!-- Large speech bubble (clay) with tail down-left -->
  <path d="M 24,6 L 180,6 Q 196,6 196,22 L 196,108 Q 196,124 180,124 L 68,124 L 46,148 L 38,124 L 24,124 Q 8,124 8,108 L 8,22 Q 8,6 24,6 Z"
        fill="#C4956A" fill-opacity="0.18" stroke="#C4956A" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Text lines -->
  <line x1="28" y1="48" x2="138" y2="48" stroke="#F5F0E8" stroke-width="3" stroke-linecap="round" opacity="0.75"/>
  <line x1="28" y1="68" x2="162" y2="68" stroke="#F5F0E8" stroke-width="3" stroke-linecap="round" opacity="0.75"/>
  <line x1="28" y1="88" x2="110" y2="88" stroke="#F5F0E8" stroke-width="3" stroke-linecap="round" opacity="0.75"/>

  <!-- Small response bubble (sage) with tail up-right -->
  <path d="M 74,120 L 170,120 L 192,98 L 220,120 L 238,120 Q 252,120 252,134 L 252,206 Q 252,220 238,220 L 74,220 Q 60,220 60,206 L 60,134 Q 60,120 74,120 Z"
        fill="#7A9E7E" fill-opacity="0.15" stroke="#7A9E7E" stroke-width="2" stroke-linejoin="round"/>
  <!-- Text lines -->
  <line x1="78" y1="152" x2="192" y2="152" stroke="#D4E4D6" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="78" y1="172" x2="228" y2="172" stroke="#D4E4D6" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="78" y1="192" x2="162" y2="192" stroke="#D4E4D6" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- MINI CLINIC BUILDING (bottom-left) -->
  <!-- Flat parapet -->
  <rect x="4" y="228" width="108" height="9" rx="2"
        fill="#C4956A" fill-opacity="0.3" stroke="#C4956A" stroke-width="1.5"/>
  <!-- Building body -->
  <rect x="8" y="236" width="100" height="42" rx="2"
        fill="#C4956A" fill-opacity="0.1" stroke="#C4956A" stroke-width="1.8"/>
  <!-- Two windows -->
  <rect x="16" y="242" width="22" height="17" rx="2"
        fill="#D4E4D6" fill-opacity="0.25" stroke="#D4E4D6" stroke-width="1.5" opacity="0.8"/>
  <line x1="27" y1="242" x2="27" y2="259" stroke="#D4E4D6" stroke-width="1" opacity="0.5"/>
  <rect x="78" y="242" width="22" height="17" rx="2"
        fill="#D4E4D6" fill-opacity="0.25" stroke="#D4E4D6" stroke-width="1.5" opacity="0.8"/>
  <line x1="89" y1="242" x2="89" y2="259" stroke="#D4E4D6" stroke-width="1" opacity="0.5"/>
  <!-- Mini cross -->
  <rect x="49" y="241" width="18" height="6" rx="1" fill="#C4956A" fill-opacity="0.55" stroke="#C4956A" stroke-width="1"/>
  <rect x="55" y="235" width="6" height="18" rx="1" fill="#C4956A" fill-opacity="0.55" stroke="#C4956A" stroke-width="1"/>
  <!-- Mini door -->
  <rect x="44" y="258" width="28" height="20" rx="2"
        fill="#7A9E7E" fill-opacity="0.2" stroke="#7A9E7E" stroke-width="1.5"/>

  <!-- MINI LAPTOP (bottom-right) -->
  <!-- Screen -->
  <rect x="164" y="228" width="112" height="38" rx="5"
        fill="#C4956A" fill-opacity="0.1" stroke="#C4956A" stroke-width="1.8"/>
  <!-- Camera dot -->
  <circle cx="220" cy="232" r="2.5" fill="#C4956A" opacity="0.65"/>
  <!-- Screen glass -->
  <rect x="172" y="236" width="96" height="24" rx="3"
        fill="#7A9E7E" fill-opacity="0.1" stroke="#D4E4D6" stroke-width="1.2" opacity="0.6"/>
  <!-- Person silhouette inside screen -->
  <circle cx="220" cy="244" r="7" fill="#D4E4D6" fill-opacity="0.3" stroke="#D4E4D6" stroke-width="1.5" opacity="0.65"/>
  <!-- Base/keyboard -->
  <rect x="156" y="266" width="128" height="11" rx="4"
        fill="#C4956A" fill-opacity="0.12" stroke="#C4956A" stroke-width="1.8"/>
</svg>
