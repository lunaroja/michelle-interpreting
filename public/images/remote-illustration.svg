<svg viewBox="0 0 270 220" xmlns="http://www.w3.org/2000/svg" fill="none">

  <!-- SMARTPHONE (left) -->
  <!-- Phone body -->
  <rect x="12" y="22" width="84" height="158" rx="14"
        fill="#C4956A" fill-opacity="0.12" stroke="#C4956A" stroke-width="2.5"/>
  <!-- Earpiece bar -->
  <rect x="40" y="34" width="28" height="5" rx="2.5" fill="#C4956A" opacity="0.55"/>
  <!-- Screen area -->
  <rect x="22" y="48" width="64" height="104" rx="5"
        fill="#7A9E7E" fill-opacity="0.12" stroke="#D4E4D6" stroke-width="1.5" opacity="0.7"/>
  <!-- Home button -->
  <circle cx="54" cy="164" r="9" stroke="#C4956A" stroke-width="2" opacity="0.65"/>
  <!-- Audio wave bars inside screen (phone call indicator) -->
  <line x1="36" y1="94" x2="36" y2="108" stroke="#D4E4D6" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="48" y1="82" x2="48" y2="120" stroke="#D4E4D6" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="60" y1="88" x2="60" y2="114" stroke="#D4E4D6" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="72" y1="96" x2="72" y2="106" stroke="#D4E4D6" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

  <!-- LAPTOP (right) -->
  <!-- Monitor bezel -->
  <rect x="112" y="14" width="148" height="112" rx="10"
        fill="#C4956A" fill-opacity="0.1" stroke="#C4956A" stroke-width="2.5"/>
  <!-- Camera dot -->
  <circle cx="186" cy="19" r="3.5" fill="#C4956A" opacity="0.65"/>
  <!-- Screen glass -->
  <rect x="122" y="24" width="128" height="92" rx="5"
        fill="#7A9E7E" fill-opacity="0.1" stroke="#D4E4D6" stroke-width="1.5" opacity="0.6"/>
  <!-- Keyboard base (slightly wider than screen) -->
  <rect x="100" y="126" width="172" height="18" rx="6"
        fill="#C4956A" fill-opacity="0.12" stroke="#C4956A" stroke-width="2"/>
  <!-- Keyboard hinge line -->
  <line x1="122" y1="126" x2="250" y2="126" stroke="#C4956A" stroke-width="1" opacity="0.3"/>

  <!-- Video call content inside screen -->
  <!-- Person head silhouette -->
  <circle cx="186" cy="62" r="18"
          fill="#D4E4D6" fill-opacity="0.2" stroke="#D4E4D6" stroke-width="2" opacity="0.75"/>
  <!-- Person shoulders arc -->
  <path d="M 155,103 C 155,85 165,78 186,78 C 207,78 217,85 217,103"
        stroke="#D4E4D6" stroke-width="2" stroke-linecap="round" opacity="0.65" fill="#D4E4D6" fill-opacity="0.1"/>
  <!-- Name bar at screen bottom -->
  <rect x="150" y="105" width="72" height="8" rx="4" fill="#7A9E7E" opacity="0.35"/>

  <!-- Wireless signal dots between phone and laptop -->
  <circle cx="104" cy="75" r="4" fill="#7A9E7E" opacity="0.5"/>
  <circle cx="104" cy="62" r="3" fill="#7A9E7E" opacity="0.35"/>
  <circle cx="104" cy="88" r="3" fill="#7A9E7E" opacity="0.35"/>
</svg>
